<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logcurse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>logcurse</h1>
        <span id="file-info"></span>
        <span id="version"></span>
    </div>
    <div id="container">
        <div id="file-pane" class="pane">
            <div class="pane-header">File</div>
            <div id="file-content" class="pane-content"></div>
        </div>
        <div id="comment-pane" class="pane">
            <div class="pane-header">Comments</div>
            <div id="comment-content" class="pane-content"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
