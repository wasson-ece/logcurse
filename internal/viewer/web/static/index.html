<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>logcurse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>logcurse</h1>
        <span id="file-info"></span>
        <a id="version" href="https://logcurse.wasson-ece.dev" target="_blank" rel="noopener"></a>
    </div>
    <div id="container">
        <div id="file-pane" class="pane">
            <div class="pane-header">File <a id="file-download" class="pane-header-link"></a></div>
            <div id="file-content" class="pane-content"></div>
        </div>
        <div id="comment-pane" class="pane">
            <div class="pane-header">Comments <a id="comments-download" class="pane-header-link"></a></div>
            <div id="comment-content" class="pane-content"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
