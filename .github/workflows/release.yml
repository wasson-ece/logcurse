name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -v -ldflags "-X main.version=${GITHUB_REF_NAME}" -o "logcurse-${GOOS}-${GOARCH}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logcurse-${{ matrix.goos }}-${{ matrix.goarch }}
          path: logcurse-*

  installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: logcurse-windows-amd64
          path: installer

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc /DMyAppVersion=${{ github.ref_name }} installer\logcurse.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: logcurse-installer
          path: installer/output/logcurse-setup-amd64.exe

  release:
    needs: [build, installer]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum logcurse-* > checksums-sha256.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            logcurse-*
            checksums-sha256.txt

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/wasson-ece/logcurse:${{ github.ref_name }}
            ghcr.io/wasson-ece/logcurse:latest
